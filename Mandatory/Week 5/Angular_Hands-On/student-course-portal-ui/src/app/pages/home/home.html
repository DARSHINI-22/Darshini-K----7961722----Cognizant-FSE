<h1>{{ portalName }}</h1>

<p>
  Manage your courses, monitor your academic progress and view your profile.
</p>

<button
    [disabled]="!isPortalActive"
    (click)="onEnrollClick()">
    Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<input
type="text"
placeholder="Search Courses"
[(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>

<hr>

<div class="stats">

    <div class="card">
        <h3>Courses Available</h3>
        <p>12</p>
    </div>

    <div class="card">
        <h3>Enrolled</h3>
        <p>3</p>
    </div>

    <div class="card">
        <h3>GPA</h3>
        <p>3.8</p>
    </div>

</div>
